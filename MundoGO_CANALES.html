<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grilla de Canales MUNDO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        /* Colores Corporativos */
        .text-mundo { color: #0046ad; }
        .bg-mundo { background-color: #0046ad; }
        .border-mundo { border-color: #0046ad; }
        .text-cyan-mundo { color: #00d1ff; }

        /* Tarjeta de Canal */
        .channel-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
        }
        
        .channel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 70, 173, 0.15);
            border-color: #0046ad;
        }

        .channel-number {
            background-color: #0046ad;
            color: white;
            font-size: 1.25rem;
            font-weight: 800;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .channel-name {
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            color: #334155;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .category-badge {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            background-color: #f1f5f9;
            padding: 4px 10px;
            border-radius: 9999px;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Scrollbar oculto para filtros */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .filter-btn {
            white-space: nowrap;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            background-color: white;
            color: #64748b;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background-color: #0046ad;
            color: white;
            border-color: #0046ad;
        }
    </style>
</head>

        const sortedChannels = channels.sort((a, b) => a.n - b.n);

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const filters = document.querySelectorAll('.filter-btn');

        function render(data) {
            grid.innerHTML = '';
            if (data.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            data.forEach(ch => {
                const card = document.createElement('div');
                card.className = "channel-card";
                card.innerHTML = `
                    <div class="channel-number">${ch.n}</div>
                    <h3 class="channel-name">${ch.t}</h3>
                    <div class="category-badge">${ch.c}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Buscador
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = sortedChannels.filter(ch => 
                ch.t.toLowerCase().includes(val) || 
                ch.n.toString().includes(val)
            );
            render(filtered);
            
            // Reset visual de filtros
            filters.forEach(btn => btn.classList.remove('active'));
            if(val === '') filters[0].classList.add('active');
        });

        // Filtros
        window.filter = (cat, btn) => {
            searchInput.value = '';
            filters.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (cat === 'Todos') {
                render(sortedChannels);
            } else {
                render(sortedChannels.filter(ch => {
                    // Mapeo simple de categorías
                    if(cat === 'Variedades' && ch.c === 'Variedades') return true;
                    if(cat === 'Estilo' && ch.c === 'Estilo') return true;
                    if(cat === 'Cultura' && (ch.c === 'Cultura' || ch.c === 'Internacional')) return true;
                    return ch.c === cat;
                }));
            }
        };

        window.resetSearch = () => {
            searchInput.value = '';
            filters[0].click();
        };

        // Inicio
        render(sortedChannels);
    </script>
